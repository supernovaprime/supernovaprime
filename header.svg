<svg width="860" height="280" viewBox="0 0 860 280" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Flowing/animated linear gradient for the branding name -->
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff">
        <animate attributeName="stop-color" values="#00d4ff; #bc13fe; #39ff14; #00d4ff" dur="6s" repeatCount="indefinite" />
      </stop>
      <stop offset="50%" stop-color="#bc13fe">
        <animate attributeName="stop-color" values="#bc13fe; #39ff14; #00d4ff; #bc13fe" dur="6s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#39ff14">
        <animate attributeName="stop-color" values="#39ff14; #00d4ff; #bc13fe; #39ff14" dur="6s" repeatCount="indefinite" />
      </stop>
    </linearGradient>

    <!-- Animated border gradient for terminal card -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#39ff14">
        <animate attributeName="stop-color" values="#39ff14; #00d4ff; #bc13fe; #39ff14" dur="8s" repeatCount="indefinite" />
      </stop>
      <stop offset="50%" stop-color="#00d4ff">
        <animate attributeName="stop-color" values="#00d4ff; #bc13fe; #39ff14; #00d4ff" dur="8s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#bc13fe">
        <animate attributeName="stop-color" values="#bc13fe; #39ff14; #00d4ff; #bc13fe" dur="8s" repeatCount="indefinite" />
      </stop>
    </linearGradient>

    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#bc13fe" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#05050a" stop-opacity="0"/>
    </radialGradient>

    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>

    <!-- Glowing filter for the neon elements -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Typing Clip Paths -->
    <clipPath id="clip1"><rect id="rect1" x="34" y="60" width="0" height="20" /></clipPath>
    <clipPath id="clip2"><rect id="rect2" x="34" y="60" width="0" height="20" /></clipPath>
    <clipPath id="clip3"><rect id="rect3" x="34" y="60" width="0" height="20" /></clipPath>
    <clipPath id="clip4"><rect id="rect4" x="34" y="60" width="0" height="20" /></clipPath>
  </defs>

  <style>
    @keyframes pulse {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 0.8; }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
    }
    @keyframes driftRight {
      0% { transform: translateX(-10px); opacity: 0; }
      50% { opacity: 0.4; }
      100% { transform: translateX(20px); opacity: 0; }
    }
    
    /* Terminal Typewriter Animations */
    @keyframes rect1-anim {
      0% { width: 0; }
      5% { width: 135px; }
      15% { width: 135px; }
      18.3% { width: 0; }
      100% { width: 0; }
    }
    @keyframes rect2-anim {
      0%, 25% { width: 0; }
      30% { width: 160px; }
      40% { width: 160px; }
      43.3% { width: 0; }
      100% { width: 0; }
    }
    @keyframes rect3-anim {
      0%, 50% { width: 0; }
      55% { width: 135px; }
      65% { width: 135px; }
      68.3% { width: 0; }
      100% { width: 0; }
    }
    @keyframes rect4-anim {
      0%, 75% { width: 0; }
      80% { width: 145px; }
      90% { width: 145px; }
      93.3% { width: 0; }
      100% { width: 0; }
    }

    @keyframes text1-opac {
      0%, 24.9% { opacity: 1; }
      25%, 100% { opacity: 0; }
    }
    @keyframes text2-opac {
      0%, 24.9% { opacity: 0; }
      25%, 49.9% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
    @keyframes text3-opac {
      0%, 49.9% { opacity: 0; }
      50%, 74.9% { opacity: 1; }
      75%, 100% { opacity: 0; }
    }
    @keyframes text4-opac {
      0%, 74.9% { opacity: 0; }
      75%, 99.9% { opacity: 1; }
      100% { opacity: 0; }
    }

    /* Terminal Cursor Movement Synchronized with Typist */
    @keyframes cursor-move {
      0% { transform: translateX(0px); }
      5% { transform: translateX(135px); }
      15% { transform: translateX(135px); }
      18.3% { transform: translateX(0px); }
      25% { transform: translateX(0px); }
      
      30% { transform: translateX(160px); }
      40% { transform: translateX(160px); }
      43.3% { transform: translateX(0px); }
      50% { transform: translateX(0px); }
      
      55% { transform: translateX(135px); }
      65% { transform: translateX(135px); }
      68.3% { transform: translateX(0px); }
      75% { transform: translateX(0px); }
      
      80% { transform: translateX(145px); }
      90% { transform: translateX(145px); }
      93.3% { transform: translateX(0px); }
      100% { transform: translateX(0px); }
    }

    /* Cryptographic Loading Stages */
    @keyframes decrypt-stage1 {
      0% { opacity: 1; }
      25% { opacity: 0; }
      100% { opacity: 0; }
    }
    @keyframes decrypt-stage2 {
      0%, 25% { opacity: 0; }
      25.1% { opacity: 1; }
      50% { opacity: 0; }
      100% { opacity: 0; }
    }
    @keyframes decrypt-stage3 {
      0%, 50% { opacity: 0; fill: #00d4ff; }
      50.1% { opacity: 1; fill: #00d4ff; }
      75% { opacity: 1; fill: #00d4ff; }
      75.1% { fill: url(#neonGradient); opacity: 1; }
      100% { fill: url(#neonGradient); opacity: 1; }
    }

    .star { animation: pulse 3s infinite ease-in-out; }
    .star-fast { animation: pulse 1.5s infinite ease-in-out; }
    .star-slow { animation: pulse 4s infinite ease-in-out; }
    .cursor { animation: cursor-move 12s infinite linear, blink 0.8s infinite steps(2, start); }
    .floating { animation: float 5s infinite ease-in-out; }
    .neon-text { font-family: 'JetBrains Mono', 'Fira Code', monospace, sans-serif; }
    .glowing-name { filter: url(#neonGlow); }
    .drift { animation: driftRight 8s infinite linear; }

    #rect1 { animation: rect1-anim 12s infinite linear; }
    #rect2 { animation: rect2-anim 12s infinite linear; }
    #rect3 { animation: rect3-anim 12s infinite linear; }
    #rect4 { animation: rect4-anim 12s infinite linear; }

    .phrase1 { animation: text1-opac 12s infinite linear; }
    .phrase2 { animation: text2-opac 12s infinite linear; }
    .phrase3 { animation: text3-opac 12s infinite linear; }
    .phrase4 { animation: text4-opac 12s infinite linear; }

    .decrypt-s1 { animation: decrypt-stage1 1.6s forwards; }
    .decrypt-s2 { animation: decrypt-stage2 1.6s forwards; }
    .decrypt-s3 { animation: decrypt-stage3 1.6s forwards; }
  </style>

  <!-- Background -->
  <rect width="860" height="280" fill="#040408"/>
  <circle cx="430" cy="140" r="280" fill="url(#glow)"/>
  <rect width="860" height="280" fill="url(#grid)"/>

  <!-- Scanning line overlay (retro screen look) -->
  <line x1="0" y1="0" x2="860" y2="0" stroke="#ffffff" stroke-opacity="0.01" stroke-width="280" stroke-dasharray="2 2" />

  <!-- Stars -->
  <circle class="star" cx="80" cy="50" r="1.5" fill="#00d4ff" />
  <circle class="star-slow" cx="740" cy="60" r="1.2" fill="#bc13fe" />
  <circle class="star-fast" cx="210" cy="230" r="1.5" fill="#39ff14" />
  <circle class="star-slow" cx="640" cy="220" r="1" fill="#ffffff" />
  <circle class="star" cx="130" cy="160" r="1.2" fill="#ffffff" />
  <circle class="star-fast" cx="810" cy="150" r="1.5" fill="#00d4ff" />

  <!-- Floating Ambient Code Tokens -->
  <g class="drift" style="animation-delay: 0s;">
    <text class="neon-text" x="50" y="90" font-size="10" fill="#bc13fe" opacity="0.3">&lt;div&gt;</text>
  </g>
  <g class="drift" style="animation-delay: 3s;">
    <text class="neon-text" x="720" y="100" font-size="10" fill="#39ff14" opacity="0.2">() =&gt; {}</text>
  </g>
  <g class="drift" style="animation-delay: 5s;">
    <text class="neon-text" x="110" y="190" font-size="10" fill="#00d4ff" opacity="0.25">const x</text>
  </g>

  <!-- Online Indicator badge -->
  <g transform="translate(730, 25)">
    <rect width="100" height="26" rx="13" fill="#0d0d1f" stroke="#1f1f3d" stroke-width="1.5"/>
    <circle cx="16" cy="13" r="4.5" fill="#39ff14">
      <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite" />
    </circle>
    <text class="neon-text" x="28" y="17" font-size="9" font-weight="bold" fill="#39ff14" letter-spacing="0.5">SYS ONLINE</text>
  </g>

  <!-- Central Terminal Card (Floating) -->
  <g class="floating" transform="translate(260, 60)">
    <!-- Base Glow Behind Card -->
    <rect width="340" height="110" rx="10" fill="none" stroke="#bc13fe" stroke-width="6" opacity="0.1" filter="url(#neonGlow)"/>
    <!-- Terminal Outer Frame -->
    <rect width="340" height="110" rx="10" fill="#070712" stroke="url(#borderGrad)" stroke-width="1.5"/>
    
    <!-- Header Bar -->
    <path d="M0,10 Q0,0 10,0 L330,0 Q340,0 340,10 L340,25 L0,25 Z" fill="#0e0e24" stroke="url(#borderGrad)" stroke-width="1" clip-path="inset(0px 0px 1px 0px)"/>
    <circle cx="16" cy="12" r="4.5" fill="#ff5f56"/>
    <circle cx="28" cy="12" r="4.5" fill="#ffbd2e"/>
    <circle cx="40" cy="12" r="4.5" fill="#27c93f"/>
    <text class="neon-text" x="170" y="16" font-size="9" text-anchor="middle" fill="#8888aa" font-weight="bold">terminal — supernovaprime</text>
    
    <!-- Code line terminal contents -->
    <text class="neon-text" x="20" y="48" font-size="11" fill="#39ff14">supernovaprime@dev:<tspan fill="#00d4ff">~</tspan>$ <tspan fill="#ffffff" font-weight="bold">node</tspan></text>
    
    <!-- Shell prompt -->
    <text class="neon-text" x="20" y="74" font-size="11" fill="#bc13fe">&gt;</text>
    
    <!-- Alternating typed phrases -->
    <text class="neon-text phrase1" x="34" y="74" font-size="11" fill="#bc13fe" clip-path="url(#clip1)">Building the future</text>
    <text class="neon-text phrase2" x="34" y="74" font-size="11" fill="#bc13fe" clip-path="url(#clip2)">Designing architectures</text>
    <text class="neon-text phrase3" x="34" y="74" font-size="11" fill="#bc13fe" clip-path="url(#clip3)">Writing robust code</text>
    <text class="neon-text phrase4" x="34" y="74" font-size="11" fill="#bc13fe" clip-path="url(#clip4)">Velvron Labs Engineer</text>
    
    <!-- Active tracking cursor -->
    <rect class="cursor" x="34" y="63" width="7" height="12" fill="#bc13fe"/>
  </g>

  <!-- Glowing Header Name with Live Flowing Linear Gradient & Decryption -->
  <g class="glowing-name">
    <!-- Stage 1: Glitched/Alien symbols -->
    <text class="neon-text decrypt-s1" x="430" y="222" text-anchor="middle" font-size="30" font-weight="900" letter-spacing="3" fill="#00d4ff">§$¥@&amp;#%*?+!§$¥</text>
    <!-- Stage 2: Half-decoded characters -->
    <text class="neon-text decrypt-s2" x="430" y="222" text-anchor="middle" font-size="30" font-weight="900" letter-spacing="3" fill="#00d4ff">SµP€RNoV∆P®IµE</text>
    <!-- Stage 3: Fully resolved and shifting neon colors -->
    <text class="neon-text decrypt-s3" x="430" y="222" text-anchor="middle" font-size="30" font-weight="900" letter-spacing="3">SUPERNOVAPRIME</text>
  </g>
  <text class="neon-text" x="430" y="246" text-anchor="middle" font-size="11.5" fill="#8c8ca3" font-weight="bold" letter-spacing="0.5">Software Engineer • Velvron Labs • Accra, Ghana 🇬🇭</text>
</svg>