<svg width="860" height="300" viewBox="0 0 860 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="50%" stop-color="#bc13fe"/>
      <stop offset="100%" stop-color="#39ff14"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0e0e22"/>
      <stop offset="100%" stop-color="#050512"/>
    </linearGradient>
    <linearGradient id="langGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff">
        <animate attributeName="stop-color" values="#00d4ff; #bc13fe; #00d4ff" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#bc13fe">
        <animate attributeName="stop-color" values="#bc13fe; #00d4ff; #bc13fe" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <filter id="neonGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
    @keyframes scaleIn {
      from { transform: scaleX(0); }
      to { transform: scaleX(1); }
    }
    @keyframes matrix {
      0% { fill: #0d0d1f; }
      50% { fill: #39ff14; }
      100% { fill: #0e4429; }
    }
    .neon-text { font-family: 'JetBrains Mono', 'Fira Code', monospace, sans-serif; }
    .card-title { fill: #888899; font-size: 10px; font-weight: bold; letter-spacing: 1px; }
    .card-val { font-size: 24px; font-weight: 900; }
    .lang-text { fill: #888899; font-size: 11px; font-weight: bold; }
    
    .bar-animate { transform-origin: left; animation: scaleIn 1.8s cubic-bezier(0.1, 0.8, 0.2, 1) forwards; filter: url(#neonGlow); }
    .p-fast { animation: pulse 1.5s infinite ease-in-out; }
    .p-slow { animation: pulse 3s infinite ease-in-out; }
    
    .m-1 { animation: matrix 1s infinite alternate; }
    .m-2 { animation: matrix 1.4s infinite alternate 0.2s; }
    .m-3 { animation: matrix 1.8s infinite alternate 0.4s; }
    .m-4 { animation: matrix 2.2s infinite alternate 0.6s; }
    .m-5 { animation: matrix 1.2s infinite alternate 0.8s; }
  </style>

  <!-- Card Background -->
  <rect width="860" height="300" rx="12" fill="#040408" stroke="#1f1f3d" stroke-width="1.5"/>

  <!-- Title -->
  <text class="neon-text" x="30" y="35" font-size="13" font-weight="bold" fill="url(#neonGradient)">⚡ LIVE SYSTEM TELEMETRY</text>
  <line x1="30" y1="48" x2="830" y2="48" stroke="#1f1f3d" stroke-width="1"/>

  <!-- Scrolling telemetry waves behind the demographics section -->
  <g opacity="0.12" transform="translate(0, 50)">
    <path d="M -100 150 Q -50 110 0 150 T 100 150 T 200 150 T 300 150 T 400 150 T 500 150 T 600 150 T 700 150 T 800 150 T 900 150" fill="none" stroke="#bc13fe" stroke-width="2">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="200 0" dur="5s" repeatCount="indefinite"/>
    </path>
    <path d="M -100 150 Q -50 190 0 150 T 100 150 T 200 150 T 300 150 T 400 150 T 500 150 T 600 150 T 700 150 T 800 150 T 900 150" fill="none" stroke="#00d4ff" stroke-width="2">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="-200 0" dur="7s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Telemetry Metrics (4 Cards) -->
  <g transform="translate(30, 65)">
    <rect width="180" height="75" rx="8" fill="url(#cardGrad)" stroke="#1f1f3d" stroke-width="1"/>
    <text class="neon-text card-title" x="20" y="25">REPOSITORIES</text>
    <text class="neon-text card-val" x="20" y="55" fill="#00d4ff">9</text>
    <circle class="p-fast" cx="155" cy="20" r="4.5" fill="#00d4ff" filter="url(#neonGlow)"/>
  </g>

  <g transform="translate(230, 65)">
    <rect width="180" height="75" rx="8" fill="url(#cardGrad)" stroke="#1f1f3d" stroke-width="1"/>
    <text class="neon-text card-title" x="20" y="25">STARS EARNED</text>
    <text class="neon-text card-val" x="20" y="55" fill="#39ff14">0</text>
    <circle class="p-slow" cx="155" cy="20" r="4.5" fill="#39ff14" filter="url(#neonGlow)"/>
  </g>

  <g transform="translate(430, 65)">
    <rect width="180" height="75" rx="8" fill="url(#cardGrad)" stroke="#1f1f3d" stroke-width="1"/>
    <text class="neon-text card-title" x="20" y="25">TOTAL COMMITS</text>
    <text class="neon-text card-val" x="20" y="55" fill="#bc13fe">142</text>
    <circle class="p-fast" cx="155" cy="20" r="4.5" fill="#bc13fe" filter="url(#neonGlow)"/>
  </g>

  <g transform="translate(630, 65)">
    <rect width="180" height="75" rx="8" fill="url(#cardGrad)" stroke="#1f1f3d" stroke-width="1"/>
    <text class="neon-text card-title" x="20" y="25">FOLLOWERS</text>
    <text class="neon-text card-val" x="20" y="55" fill="#00d4ff">1</text>
    <circle class="p-slow" cx="155" cy="20" r="4.5" fill="#00d4ff" filter="url(#neonGlow)"/>
  </g>

  <!-- Language Demographics -->
  <g transform="translate(30, 165)">
    <text class="neon-text lang-text" x="0" y="20">TYPESCRIPT</text>
    <rect x="130" y="9" width="300" height="12" rx="4" fill="#111122"/>
    <rect class="bar-animate" x="130" y="9" width="240" height="12" rx="4" fill="url(#langGrad)"/>
    <text class="neon-text lang-text" x="445" y="20" fill="#00d4ff">80%</text>

    <text class="neon-text lang-text" x="0" y="48">JAVASCRIPT</text>
    <rect x="130" y="37" width="300" height="12" rx="4" fill="#111122"/>
    <rect class="bar-animate" x="130" y="37" width="180" height="12" rx="4" fill="url(#langGrad)"/>
    <text class="neon-text lang-text" x="445" y="48" fill="#bc13fe">60%</text>

    <text class="neon-text lang-text" x="0" y="76">PYTHON</text>
    <rect x="130" y="65" width="300" height="12" rx="4" fill="#111122"/>
    <rect class="bar-animate" x="130" y="65" width="120" height="12" rx="4" fill="url(#langGrad)"/>
    <text class="neon-text lang-text" x="445" y="76" fill="#39ff14">40%</text>
  </g>

  <!-- Simulated Contribution Matrix Activity -->
  <g transform="translate(540, 175)">
    <text class="neon-text" x="0" y="12" font-size="10.5" fill="#888899" font-weight="bold" letter-spacing="1">ACTIVITY MATRIX</text>
    
    <!-- Week 1 -->
    <rect class="m-1" x="0" y="25" width="14" height="14" rx="2" fill="#0d0d1f"/>
    <rect class="m-3" x="0" y="44" width="14" height="14" rx="2" fill="#0d0d1f"/>
    <rect class="m-2" x="0" y="63" width="14" height="14" rx="2" fill="#0d0d1f"/>
    
    <!-- Week 2 -->
    <rect class="m-4" x="19" y="25" width="14" height="14" rx="2" fill="#0d0d1f"/>
    <rect class="m-1" x="19" y="44" width="14" height="14" rx="2" fill="#0d0d1f"/>
    <rect class="m-5" x="19" y="63" width="14" height="14" rx="2" fill="#0d0d1f"/>

    <!-- Week 3 -->
    <rect class="m-2" x="38" y="25" width="14" height="14" rx="2" fill="#0d0d1f"/>
    <rect class="m-5" x="38" y="44" width="14" height="14" rx="2" fill="#0d0d1f"/>
    <rect class="m-3" x="38" y="63" width="14" height="14" rx="2" fill="#0d0d1f"/>

    <!-- Week 4 -->
    <rect class="m-1" x="57" y="25" width="14" height="14" rx="2" fill="#0d0d1f"/>
    <rect class="m-4" x="57" y="44" width="14" height="14" rx="2" fill="#0d0d1f"/>
    <rect class="m-2" x="57" y="63" width="14" height="14" rx="2" fill="#0d0d1f"/>

    <!-- Week 5 -->
    <rect class="m-3" x="76" y="25" width="14" height="14" rx="2" fill="#0d0d1f"/>
    <rect class="m-1" x="76" y="44" width="14" height="14" rx="2" fill="#0d0d1f"/>
    <rect class="m-4" x="76" y="63" width="14" height="14" rx="2" fill="#0d0d1f"/>

    <!-- Week 6 -->
    <rect class="m-5" x="95" y="25" width="14" height="14" rx="2" fill="#0d0d1f"/>
    <rect class="m-2" x="95" y="44" width="14" height="14" rx="2" fill="#0d0d1f"/>
    <rect class="m-1" x="95" y="63" width="14" height="14" rx="2" fill="#0d0d1f"/>

    <!-- Week 7 -->
    <rect class="m-2" x="114" y="25" width="14" height="14" rx="2" fill="#0d0d1f"/>
    <rect class="m-3" x="114" y="44" width="14" height="14" rx="2" fill="#0d0d1f"/>
    <rect class="m-5" x="114" y="63" width="14" height="14" rx="2" fill="#0d0d1f"/>

    <!-- Week 8 -->
    <rect class="m-4" x="133" y="25" width="14" height="14" rx="2" fill="#0d0d1f"/>
    <rect class="m-1" x="133" y="44" width="14" height="14" rx="2" fill="#0d0d1f"/>
    <rect class="m-3" x="133" y="63" width="14" height="14" rx="2" fill="#0d0d1f"/>

    <!-- Week 9 -->
    <rect class="m-1" x="152" y="25" width="14" height="14" rx="2" fill="#0d0d1f"/>
    <rect class="m-5" x="152" y="44" width="14" height="14" rx="2" fill="#0d0d1f"/>
    <rect class="m-2" x="152" y="63" width="14" height="14" rx="2" fill="#0d0d1f"/>

    <!-- Week 10 -->
    <rect class="m-3" x="171" y="25" width="14" height="14" rx="2" fill="#0d0d1f"/>
    <rect class="m-4" x="171" y="44" width="14" height="14" rx="2" fill="#0d0d1f"/>
    <rect class="m-1" x="171" y="63" width="14" height="14" rx="2" fill="#0d0d1f"/>

    <!-- Week 11 -->
    <rect class="m-2" x="190" y="25" width="14" height="14" rx="2" fill="#0d0d1f"/>
    <rect class="m-5" x="190" y="44" width="14" height="14" rx="2" fill="#0d0d1f"/>
    <rect class="m-3" x="190" y="63" width="14" height="14" rx="2" fill="#0d0d1f"/>

    <!-- Week 12 -->
    <rect class="m-4" x="209" y="25" width="14" height="14" rx="2" fill="#0d0d1f"/>
    <rect class="m-1" x="209" y="44" width="14" height="14" rx="2" fill="#0d0d1f"/>
    <rect class="m-2" x="209" y="63" width="14" height="14" rx="2" fill="#0d0d1f"/>

    <!-- Week 13 -->
    <rect class="m-5" x="228" y="25" width="14" height="14" rx="2" fill="#0d0d1f"/>
    <rect class="m-3" x="228" y="44" width="14" height="14" rx="2" fill="#0d0d1f"/>
    <rect class="m-4" x="228" y="63" width="14" height="14" rx="2" fill="#0d0d1f"/>

    <!-- Week 14 -->
    <rect class="m-1" x="247" y="25" width="14" height="14" rx="2" fill="#0d0d1f"/>
    <rect class="m-2" x="247" y="44" width="14" height="14" rx="2" fill="#0d0d1f"/>
    <rect class="m-5" x="247" y="63" width="14" height="14" rx="2" fill="#0d0d1f"/>
  </g>
</svg>