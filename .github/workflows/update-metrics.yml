name: Update Profile Metrics

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-metrics:
    name: Update visitor count and metrics
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update last updated timestamp
        run: |
          # Update the last updated comment in README
          current_date=$(date -u +"%Y-%m-%d %H:%M UTC")
          sed -i "s/<!--DATE-->.*/<!--DATE-->$current_date/" README.md
          echo "Updated timestamp to $current_date"

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          if ! git diff --quiet; then
            git add README.md
            git commit -m "chore: update last updated timestamp [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi