<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 60" width="1200" height="60">
  <defs>
    <linearGradient id="dividerGradient" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" style="stop-color:#30363d;stop-opacity:0" />
      <stop offset="10%" style="stop-color:#30363d;stop-opacity:0.5" />
      <stop offset="50%" style="stop-color:#a371f7;stop-opacity:1" />
      <stop offset="90%" style="stop-color:#30363d;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#30363d;stop-opacity:0" />
    </linearGradient>
    <linearGradient id="dividerGradientLight" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" style="stop-color:#d0d7de;stop-opacity:0" />
      <stop offset="10%" style="stop-color:#d0d7de;stop-opacity:0.5" />
      <stop offset="50%" style="stop-color:#a371f7;stop-opacity:1" />
      <stop offset="90%" style="stop-color:#d0d7de;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#d0d7de;stop-opacity:0" />
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#a371f7;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#a371f7;stop-opacity:0" />
    </radialGradient>
    <style>
      @media (prefers-color-scheme: dark) {
        .divider-line { stroke: url(#dividerGradient); }
        .center-dot { fill: url(#centerGlow); }
      }
      @media (prefers-color-scheme: light) {
        .divider-line { stroke: url(#dividerGradientLight); }
        .center-dot { fill: url(#centerGlow); }
      }
    </style>
  </defs>
  
  <!-- Main divider line -->
  <line class="divider-line" x1="0" y1="30" x2="1200" y2="30" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Center glow dot -->
  <circle class="center-dot" cx="600" cy="30" r="8"/>
  
  <!-- Small accent dots -->
  <g opacity="0.6">
    <circle cx="300" cy="30" r="2" fill="#a371f7"/>
    <circle cx="900" cy="30" r="2" fill="#a371f7"/>
    <circle cx="200" cy="30" r="1.5" fill="#58a6ff"/>
    <circle cx="1000" cy="30" r="1.5" fill="#58a6ff"/>
    <circle cx="400" cy="30" r="1.5" fill="#f778ba"/>
    <circle cx="800" cy="30" r="1.5" fill="#f778ba"/>
  </g>
</svg>